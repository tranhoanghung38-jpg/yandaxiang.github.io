<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闫达祥 | 新媒体 & AI 内容运营</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        /* 基础重置与变量 */
        :root {
            --bg-color: #0a0a0a;
            --text-main: #f5f5f5;
            --text-muted: #888888;
            --accent: #e0ff4f; /* 科技感亮黄色点缀 */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        a { color: inherit; text-decoration: none; }
        
        /* 自定义鼠标指针 */
        .cursor { width: 20px; height: 20px; border: 2px solid var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background-color 0.2s; }
        .cursor.hovered { width: 50px; height: 50px; background-color: rgba(224, 255, 79, 0.1); }

        /* 布局容器 */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 5%; }
        section { padding: 120px 0; }
        .section-title { font-size: 3rem; font-weight: 800; margin-bottom: 3rem; text-transform: uppercase; letter-spacing: -2px; }

        /* 首屏 Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; position: relative; }
